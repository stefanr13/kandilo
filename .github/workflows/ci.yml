name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-firebase-functions:
    name: Web, Firebase, and Functions
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install web dependencies
        run: npm ci

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Typecheck, Functions lint, and unit tests
        run: npm run check

      - name: Firestore and Storage rules emulator tests
        run: npm run test:firebase

      - name: Cloud Functions emulator tests
        run: npm run test:functions

      - name: Build web app
        run: npm run build

      - name: Build Functions
        run: npm --prefix functions run build
